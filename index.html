<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃宗浩的個人網頁</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

    <header>
        <h1>黃宗浩 (WinterBlues)</h1>
        <button id="theme-toggle" class="theme-btn" aria-label="切換深淺色模式">
            <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
        </button>
    </header>

    <main>
        <section id="about">
            <h2>關於我</h2>
            <p>歡迎來到我的個人網站！我是亞洲大學資訊工程學系的學生。</p>
        </section>
        
        <section id="introduction">
            <h2>自我介紹與經歷</h2>
            <ul id="intro-list" style="line-height: 1.8;">
                <li> <strong>學術背景：</strong>目前就讀亞洲大學資訊工程學系</li>
                <li> <strong>證照與培訓：</strong>持有職業安全衛生教育訓練證明，並通過臺灣學術倫理教育資源中心認證</li>
            </ul>
        </section>

        <div class="bottom-image-container">
            <img src="personal-banner.jpg" alt="風景圖片" class="bottom-right-img">
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
